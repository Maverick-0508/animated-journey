steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ui-navigator-backend'
      - './backend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ui-navigator-backend'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ui-navigator-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ui-navigator-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ui-navigator-frontend'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://ui-navigator-backend-$_REGION_SUFFIX.run.app'
      - './frontend'

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ui-navigator-frontend'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ui-navigator-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ui-navigator-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_API_URL=https://ui-navigator-backend-$_REGION_SUFFIX.run.app'

substitutions:
  _GEMINI_API_KEY: ''
  _REGION_SUFFIX: ''

images:
  - 'gcr.io/$PROJECT_ID/ui-navigator-backend'
  - 'gcr.io/$PROJECT_ID/ui-navigator-frontend'
